name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Run benchmark
        run: ./build/benchmark | tee benchmark_report.txt

      - name: Determine version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $TAG | sed 's/v\([0-9]*\).*/\1/')
          MINOR=$(echo $TAG | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
          PATCH=$(echo $TAG | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Package source
        run: |
          git archive --format=tar.gz --prefix=max-flow-solver-${{ steps.version.outputs.tag }}/ \
            HEAD -o max-flow-solver-${{ steps.version.outputs.tag }}.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "max-flow-solver ${{ steps.version.outputs.tag }}"
          body_path: benchmark_report.txt
          files: |
            max-flow-solver-${{ steps.version.outputs.tag }}.tar.gz
            benchmark_report.txt
